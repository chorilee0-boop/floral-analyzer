
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>花艺智析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#3d6e42;--g2:#6aaa6e;--g3:#b8d8b4;--g4:#e6f4e2;--g5:#f0f8ee;
  --cream:#f6f1e7;--cream2:#faf7f0;--dark:#1e2e1e;--mid:#5a6a58;--lt:#98aa90;
}
body{background:var(--cream);font-family:'Noto Serif SC',Georgia,serif;min-height:100vh}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.52);z-index:2000;
  display:none;align-items:center;justify-content:center;padding:20px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:22px;padding:30px 26px;width:100%;max-width:420px;
  box-shadow:0 24px 64px rgba(0,0,0,0.22)}
.modal h3{font-size:18px;color:var(--dark);margin-bottom:7px;font-weight:900}
.modal p{font-size:12px;color:#9aaa90;margin-bottom:18px;line-height:1.8}
.modal input{width:100%;padding:13px 15px;border:2px solid var(--g3);border-radius:12px;
  font-size:14px;font-family:inherit;background:var(--g4);color:var(--dark);
  outline:none;margin-bottom:13px}
.modal input:focus{border-color:var(--g1)}
.mbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--g2),var(--g1));
  color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:800;
  cursor:pointer;font-family:inherit;letter-spacing:0.06em}
.mx{float:right;background:none;border:none;font-size:26px;cursor:pointer;color:#ccc;line-height:1;margin-top:-4px}

/* HEADER */
.hdr{text-align:center;padding:34px 20px 18px;position:relative;
  background:linear-gradient(180deg,rgba(224,240,220,0.7) 0%,transparent 100%)}
.gear{position:absolute;right:20px;top:34px;width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.92);border:1.5px solid var(--g3);
  font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(0,0,0,0.09);touch-action:manipulation}
.hdr h1{font-size:31px;font-weight:900;color:var(--dark);letter-spacing:0.13em;margin:8px 0 5px}
.hdr p{font-size:13px;color:var(--lt);letter-spacing:0.07em}

/* UPLOAD */
.wrap{max-width:840px;margin:0 auto;padding:0 16px 80px}
.ucard{background:rgba(255,255,255,0.9);border-radius:24px;padding:22px;
  margin-bottom:22px;box-shadow:0 6px 32px rgba(70,120,60,0.1);
  border:1px solid rgba(140,170,120,0.2)}

/* Drop zone - beautiful upgrade */
.dz{position:relative;border-radius:20px;overflow:hidden;margin-bottom:16px;
  background:linear-gradient(135deg,#e8f4e4,#f0f8ec);
  border:2px dashed var(--g3);min-height:260px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.35s;cursor:pointer}
.dz::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 40%,rgba(140,200,130,0.15) 0%,transparent 60%),
  radial-gradient(ellipse at 70% 70%,rgba(180,220,160,0.1) 0%,transparent 60%);
  pointer-events:none}
.dz.filled{background:#fff;border-style:solid;border-color:var(--g3);min-height:340px;cursor:default}
.dz.filled::before{display:none}
.dz img{width:100%;max-height:420px;object-fit:contain;border-radius:14px;
  box-shadow:0 8px 32px rgba(0,0,0,0.1);display:block}
.dz-img-wrap{padding:12px;width:100%}
.ph{text-align:center;padding:44px 24px;position:relative;z-index:1}
.ph-icon{font-size:60px;display:block;margin-bottom:14px;
  filter:drop-shadow(0 4px 12px rgba(80,140,70,0.22))}
.ph-t{font-size:16px;color:var(--dark);font-weight:700;margin-bottom:5px}
.ph-s{font-size:12px;color:var(--lt)}
.dz-badge{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.85);
  border:1px solid var(--g3);border-radius:20px;padding:4px 12px;
  font-size:11px;color:var(--g1);font-weight:700;display:none}
.dz.filled .dz-badge{display:block}
.dz-corner{position:absolute;width:20px;height:20px;border-color:var(--g2);border-style:solid;}
.dz-corner.tl{top:10px;left:10px;border-width:2px 0 0 2px;border-radius:4px 0 0 0}
.dz-corner.tr{top:10px;right:10px;border-width:2px 2px 0 0;border-radius:0 4px 0 0}
.dz-corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px;border-radius:0 0 0 4px}
.dz-corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0;border-radius:0 0 4px 0}

.ulbl{display:block;width:100%;padding:15px;text-align:center;
  background:linear-gradient(135deg,#7aba74,var(--g1));color:#fff;
  border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;
  margin-bottom:10px;box-shadow:0 5px 18px rgba(60,110,55,0.28);
  letter-spacing:0.07em;touch-action:manipulation}
.abtn{display:none;width:100%;padding:15px;
  background:linear-gradient(135deg,#4e8450,#2e5e32);color:#fff;
  border:none;border-radius:13px;font-size:15px;font-weight:800;
  cursor:pointer;font-family:inherit;letter-spacing:0.07em;
  box-shadow:0 5px 18px rgba(60,110,55,0.28);touch-action:manipulation}
.abtn:disabled{opacity:0.65}
.errmsg{color:#b03030;text-align:center;font-size:13px;margin-top:10px;line-height:1.5}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:16px;height:16px;border:2.5px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;
  display:inline-block;vertical-align:middle;margin-right:8px}

/* ═══ INFOGRAPHIC ═══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.infog{background:var(--cream2);border-radius:26px;overflow:hidden;
  box-shadow:0 12px 56px rgba(60,100,55,0.16);
  animation:fadeUp 0.7s ease both;border:1.5px solid var(--g3)}

/* ── Title ── */
.ig-top{background:linear-gradient(135deg,#f0f9ec 0%,#faf7ee 100%);
  padding:30px 32px 24px;text-align:center;border-bottom:1.5px solid #d8eed0}
.ig-sub{display:inline-block;font-size:10px;color:var(--g1);font-weight:800;
  letter-spacing:0.22em;background:var(--g4);padding:4px 16px;
  border-radius:20px;margin-bottom:12px;border:1px solid var(--g3);min-width:10px}
.ig-title{font-size:26px;font-weight:900;color:var(--dark);
  letter-spacing:0.1em;margin-bottom:10px;line-height:1.3;min-width:10px}
.ig-desc-lbl{font-size:10px;color:var(--lt);letter-spacing:0.12em;
  font-weight:700;margin-bottom:8px;text-transform:uppercase}
.ig-desc{font-size:13px;color:var(--mid);line-height:2;
  max-width:600px;margin:0 auto;text-align:left;min-width:10px}

/* ── Center photo strip ── */
.ig-photo{background:linear-gradient(180deg,#eef8e8,#e8f4e0);
  border-top:1px solid #d8eed0;border-bottom:1px solid #d8eed0;
  padding:24px 16px;display:flex;flex-direction:column;
  align-items:center;gap:14px}
.photo-frame{position:relative;width:190px;height:190px}
.photo-ring{position:absolute;inset:-6px;border-radius:50%;
  border:2px dashed rgba(100,160,90,0.35);pointer-events:none}
.photo-ring2{position:absolute;inset:-12px;border-radius:50%;
  border:1px dashed rgba(100,160,90,0.18);pointer-events:none}
.photo-circle{width:190px;height:190px;border-radius:50%;overflow:hidden;
  border:5px solid #b8d8b0;box-shadow:0 10px 36px rgba(50,90,45,0.25)}
.photo-circle img{width:100%;height:100%;object-fit:cover}
.pal-wrap{text-align:center}
.pal-lbl{font-size:10px;color:var(--lt);letter-spacing:0.12em;font-weight:700;margin-bottom:7px}
.pal{display:flex;gap:6px;justify-content:center}
.pdot{width:24px;height:24px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.9);
  box-shadow:0 3px 8px rgba(0,0,0,0.15)}

/* ── Two columns ── */
.ig-cols{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #ddeedd}
.ig-col{padding:22px 20px}
.ig-col:first-child{border-right:1px solid #ddeedd}
.col-title{font-size:13px;font-weight:900;color:var(--dark);
  padding-bottom:10px;border-bottom:2.5px solid var(--g3);
  margin-bottom:16px;letter-spacing:0.07em}

/* ── Flower card with photo ── */
.fc{background:linear-gradient(135deg,rgba(224,242,220,0.95),rgba(244,240,228,0.7));
  border-radius:14px;padding:12px 13px;margin-bottom:10px;
  border:1px solid rgba(160,204,150,0.4);display:flex;gap:11px;align-items:flex-start}
.fc-photo{width:46px;height:46px;border-radius:10px;overflow:hidden;flex-shrink:0;
  border:1.5px solid rgba(140,190,130,0.4);background:#e8f4e4;
  display:flex;align-items:center;justify-content:center;position:relative}
.fc-photo img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.fc-photo .fallback{font-size:24px;line-height:1}
.fc-photo .img-loading{position:absolute;inset:0;background:#e8f4e4;
  display:flex;align-items:center;justify-content:center;font-size:18px;border-radius:9px}
.fc-body{flex:1;min-width:0}
.fc-role{font-size:9px;color:var(--g1);font-weight:800;
  letter-spacing:0.14em;margin-bottom:3px}
.fc-name{font-size:13px;font-weight:700;color:var(--dark);
  margin-bottom:3px;line-height:1.3;min-width:10px}
.fc-desc{font-size:11px;color:var(--mid);line-height:1.75;min-width:10px}

/* ── Aesthetic card ── */
.ac{background:linear-gradient(135deg,rgba(244,236,222,0.95),rgba(228,242,224,0.6));
  border-radius:14px;padding:12px 13px;margin-bottom:10px;
  border:1px solid rgba(196,178,154,0.35);display:flex;gap:11px;align-items:flex-start}
.ac-icon{font-size:22px;flex-shrink:0;margin-top:1px;width:32px;text-align:center}
.ac-title{font-size:13px;font-weight:800;color:var(--dark);margin-bottom:3px;min-width:10px}
.ac-desc{font-size:11px;color:#686860;line-height:1.75;min-width:10px}

/* ── Footer ── */
.ig-foot{background:linear-gradient(135deg,#eaf6e4,#f5f0e4);
  border-top:1.5px solid #d8eed0;padding:15px 22px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.foot-hint{font-size:11px;color:var(--lt);display:flex;align-items:center;gap:5px}
.foot-btns{display:flex;gap:8px}
.dl-btn{padding:11px 22px;background:linear-gradient(135deg,var(--g2),var(--g1));
  color:#fff;border:none;border-radius:11px;font-size:13px;font-weight:800;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 14px rgba(60,110,55,0.28);touch-action:manipulation;letter-spacing:0.05em}
.re-btn{padding:11px 16px;background:#fff;color:var(--mid);
  border:1.5px solid var(--g3);border-radius:11px;font-size:13px;
  font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation}
.add-btn{background:none;border:1.5px dashed var(--g3);border-radius:11px;
  width:100%;padding:9px;color:var(--g1);font-size:13px;font-weight:700;
  cursor:pointer;margin-top:5px;font-family:inherit;letter-spacing:0.04em}

/* Editable */
[contenteditable]{outline:none;cursor:text;border-radius:4px;
  transition:background 0.15s,box-shadow 0.15s}
[contenteditable]:hover{background:rgba(100,170,80,0.08)}
[contenteditable]:focus{background:rgba(100,170,80,0.14);
  box-shadow:0 0 0 2px rgba(80,150,70,0.38);padding:1px 4px}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:var(--dark);color:#fff;padding:11px 24px;border-radius:22px;
  font-size:14px;font-weight:700;z-index:9999;
  box-shadow:0 6px 20px rgba(0,0,0,0.22);pointer-events:none;
  animation:fadeUp 0.3s ease;font-family:inherit;white-space:nowrap}
</style>
</head>
<body>

<!-- Settings -->
<div class="ov" id="ov">
  <div class="modal">
    <button class="mx" onclick="closeModal()">×</button>
    <h3>⚙️ API Key 设置</h3>
    <p>输入你的 OpenRouter API Key（sk-or-v1- 开头）<br/>Key 仅保存在本机浏览器，不上传任何服务器。</p>
    <input type="password" id="keyInput" placeholder="sk-or-v1-xxxxxxxxxxxx"/>
    <button class="mbtn" onclick="saveKey()">✅ 保存 Key</button>
  </div>
</div>

<!-- Header -->
<div class="hdr">
  <button class="gear" onclick="openModal()" title="设置">⚙️</button>
  <div style="font-size:52px;filter:drop-shadow(0 4px 12px rgba(80,140,70,0.2))">🌸</div>
  <h1>花艺智析</h1>
  <p>上传花艺作品 · AI 深度识别 · 生成专业解析图</p>
</div>

<div class="wrap">
  <!-- Upload card -->
  <div class="ucard">
    <div class="dz" id="dz">
      <div class="dz-corner tl"></div>
      <div class="dz-corner tr"></div>
      <div class="dz-corner bl"></div>
      <div class="dz-corner br"></div>
      <span class="dz-badge">✓ 图片已加载</span>
      <div class="ph" id="ph">
        <span class="ph-icon">🌿</span>
        <p class="ph-t">上传你的花艺作品</p>
        <span class="ph-s">支持 JPG · PNG · WEBP · HEIC</span>
      </div>
    </div>
    <label class="ulbl" for="fi">📷 选择花艺图片</label>
    <input type="file" id="fi" accept="image/*" style="display:none"/>
    <button class="abtn" id="abtn" onclick="analyze()">✨ 开始 AI 深度分析</button>
    <p class="errmsg" id="errmsg"></p>
  </div>

  <div id="rw"></div>
</div>

<script>
const PROMPT=`你是顶级花艺设计师兼植物分类学家，拥有20年专业经验，熟知全球3000余种观赏植物。

仔细观察图片花艺作品每种花材的：花瓣形状数量排列、花朵轮廓大小、颜色细节、叶形叶脉质感、茎干特征。

易混淆花材区分：
• 非洲菊(大花8-12cm，单层舌状花瓣，粗茎)vs雏菊(小花多朵，细茎)
• 洋牡丹/陆莲(多层紧密花瓣，草本)vs牡丹(大花，木质茎)vs芍药(大花，草本，花蕾圆)
• 尤加利(蓝绿对生圆叶，银白质感)vs其他圆叶绿植
• 康乃馨(锯齿花瓣，筒状花萼，多色)vs石竹(更小更细)
• 满天星(极小白花云雾状密集)vs石膏花
• 绣球(大型球状花序，小花聚合)vs其他团状花
• 洋桔梗(喇叭形，薄花瓣，单双层)vs其他喇叭花

严格只返回JSON，不含markdown：
{"title":"有意境标题6-10字","subtitle":"风格流派如自然主义·侘寂美学","introduction":"专业美学评价70字含整体印象空间感情绪","flowers":[{"name":"精确花材名如白色非洲菊","searchName":"英文搜索名如gerbera daisy white","role":"焦点花|填充花|骨架材料|点缀花|叶材","description":"形态特征与视觉作用28字","emoji":"最接近emoji"}],"style":{"title":"整体风格4-6字","description":"风格特点空间感情绪38字"},"colorScheme":{"title":"色彩方案4-6字","description":"搭配逻辑视觉层次38字","colors":["5个实际hex色值"]},"vase":{"title":"容器评价4-6字","description":"材质造型与花材呼应38字"},"composition":{"title":"构成技法4-6字","description":"空间层次视觉重心线条走势38字"}}
flowers必须含图中所有可辨花材至少5种，searchName用于图片搜索须准确。`;

let b64=null,mime="image/jpeg",imgUrl=null;

window.addEventListener('DOMContentLoaded',()=>{
  try{const k=localStorage.getItem('or_key');
    if(k)document.getElementById('keyInput').value=k;
    else setTimeout(openModal,700);
  }catch(e){}
});
function openModal(){document.getElementById('ov').classList.add('open')}
function closeModal(){document.getElementById('ov').classList.remove('open')}
document.getElementById('ov').addEventListener('click',function(e){if(e.target===this)closeModal()});
function saveKey(){
  const v=document.getElementById('keyInput').value.trim();
  if(!v){toast('请先输入 API Key');return;}
  try{localStorage.setItem('or_key',v);}catch(e){}
  closeModal();toast('✅ Key 已保存');
}
function getKey(){try{return localStorage.getItem('or_key')||'';}catch(e){return '';}}
function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2600);
}

// Upload
document.getElementById('fi').addEventListener('change',e=>{
  if(e.target.files[0])loadFile(e.target.files[0]);
});
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='var(--g1)'});
dz.addEventListener('dragleave',()=>{dz.style.borderColor='var(--g3)'});
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.style.borderColor='var(--g3)';
  if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);
});

function loadFile(file){
  if(!file.type.startsWith('image/')){toast('请选择图片文件');return;}
  mime=file.type;imgUrl=URL.createObjectURL(file);
  // Beautiful image display
  const wrap=document.createElement('div');
  wrap.className='dz-img-wrap';
  const img=document.createElement('img');
  img.src=imgUrl;img.alt='花艺作品';
  wrap.appendChild(img);
  dz.innerHTML='';
  dz.appendChild(wrap);
  // Re-add corners and badge
  ['tl','tr','bl','br'].forEach(c=>{const d=document.createElement('div');d.className='dz-corner '+c;dz.appendChild(d);});
  const badge=document.createElement('span');badge.className='dz-badge';badge.textContent='✓ 图片已加载';dz.appendChild(badge);
  dz.classList.add('filled');
  document.getElementById('abtn').style.display='block';
  document.getElementById('rw').innerHTML='';
  document.getElementById('errmsg').textContent='';
  const r=new FileReader();r.onload=e=>{b64=e.target.result.split(',')[1];};r.readAsDataURL(file);
}

// Analyze
async function analyze(){
  const key=getKey();
  if(!key){openModal();return;}
  if(!b64){toast('请先选择图片');return;}
  const btn=document.getElementById('abtn');
  btn.disabled=true;
  btn.innerHTML='<span class="sp"></span>AI 深度识别花材中，请稍候...';
  document.getElementById('errmsg').textContent='';
  try{
    const res=await fetch('https://openrouter.ai/api/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
      body:JSON.stringify({
        model:'google/gemini-2.0-flash-001',
        max_tokens:3000,
        messages:[{role:'user',content:[
          {type:'text',text:PROMPT},
          {type:'image_url',image_url:{url:`data:${mime};base64,${b64}`}}
        ]}]
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    const raw=data.choices?.[0]?.message?.content||'';
    const clean=raw.replace(/```json|```/g,'').trim();
    try{renderInfo(JSON.parse(clean));}
    catch(je){
      let fx=clean;
      const ob=(fx.match(/\{/g)||[]).length,cb=(fx.match(/\}/g)||[]).length;
      const ol=(fx.match(/\[/g)||[]).length,cl=(fx.match(/\]/g)||[]).length;
      for(let i=0;i<ol-cl;i++)fx+=']';
      for(let i=0;i<ob-cb;i++)fx+='}';
      try{renderInfo(JSON.parse(fx));}
      catch(je2){throw new Error('AI返回内容解析失败，请重试');}
    }
  }catch(e){
    document.getElementById('errmsg').textContent='分析失败：'+e.message;
  }finally{
    btn.disabled=false;btn.innerHTML='✨ 重新分析';
  }
}

// Flower photo search via Unsplash
function getFlowerPhotoUrl(searchName,emoji){
  // Use Unsplash source for real flower photos
  const q=encodeURIComponent(searchName+' flower');
  return `https://source.unsplash.com/80x80/?${q}`;
}

function E(tag,cls,html){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(html!==undefined)el.innerHTML=html;
  return el;
}
function ed(el){el.contentEditable='true';return el;}

function renderInfo(r){
  const wrap=document.getElementById('rw');
  wrap.innerHTML='';
  const ig=E('div','infog');

  // ── Title section ──
  const top=E('div','ig-top');
  top.append(
    ed(E('div','ig-sub',r.subtitle||'')),
    ed(E('div','ig-title',r.title||'')),
    E('div','ig-desc-lbl','作 品 介 绍'),
    ed(E('div','ig-desc',r.introduction||''))
  );
  ig.appendChild(top);

  // ── Center photo ──
  const photoSec=E('div','ig-photo');
  const frame=E('div','photo-frame');
  frame.innerHTML=`
    <div class="photo-ring"></div>
    <div class="photo-ring2"></div>
    <div class="photo-circle"><img src="${imgUrl}" alt="花艺"/></div>`;
  const palWrap=E('div','pal-wrap');
  palWrap.appendChild(E('div','pal-lbl','色 彩 提 取'));
  const pal=E('div','pal');
  (r.colorScheme?.colors||[]).forEach(c=>{
    const d=E('div','pdot');d.style.background=c;d.title=c;pal.appendChild(d);
  });
  palWrap.appendChild(pal);
  photoSec.append(frame,palWrap);
  ig.appendChild(photoSec);

  // ── Two columns ──
  const cols=E('div','ig-cols');

  // Left: flowers
  const left=E('div','ig-col');
  left.appendChild(E('div','col-title','🌺 花材成分识别'));
  (r.flowers||[]).forEach(f=>{
    left.appendChild(makeFlowerCard(f));
  });
  const addBtn=E('button','add-btn','＋ 添加花材');
  addBtn.onclick=()=>left.insertBefore(makeFlowerCard(null),addBtn);
  left.appendChild(addBtn);

  // Right: aesthetics
  const right=E('div','ig-col');
  right.appendChild(E('div','col-title','🎨 设计美学解析'));
  [['🌿',r.style],['🎨',r.colorScheme],['🏺',r.vase],['✦',r.composition]].forEach(([icon,d])=>{
    if(!d)return;
    const ac=E('div','ac');
    const ic=E('span','ac-icon',icon);
    const body=E('div',null);
    body.append(ed(E('div','ac-title',d.title||'')),ed(E('div','ac-desc',d.description||'')));
    ac.append(ic,body);right.appendChild(ac);
  });

  cols.append(left,right);
  ig.appendChild(cols);

  // ── Footer ──
  const foot=E('div','ig-foot');
  const hint=E('div','foot-hint','✏️ 点击任意文字即可编辑');
  const btns=E('div','foot-btns');
  const reBtn=E('button','re-btn','↺ 重新分析');
  reBtn.onclick=()=>document.getElementById('abtn').click();
  const dlBtn=E('button','dl-btn','📥 下载高清分析图');
  dlBtn.onclick=()=>dlImage(ig,foot);
  btns.append(reBtn,dlBtn);
  foot.append(hint,btns);
  ig.appendChild(foot);

  wrap.appendChild(ig);
  setTimeout(()=>ig.scrollIntoView({behavior:'smooth',block:'start'}),120);
}

function makeFlowerCard(f){
  const fc=E('div','fc');
  // Photo box
  const photoBox=E('div','fc-photo');
  if(f&&f.searchName){
    const loadDiv=E('div','img-loading','⏳');
    photoBox.appendChild(loadDiv);
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      photoBox.innerHTML='';
      img.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:9px';
      photoBox.appendChild(img);
    };
    img.onerror=()=>{
      photoBox.innerHTML=`<span class="fallback">${f.emoji||'🌸'}</span>`;
    };
    img.src=`https://source.unsplash.com/80x80/?${encodeURIComponent((f.searchName||f.name)+' flower')}`;
  } else {
    photoBox.innerHTML=`<span class="fallback">${f?f.emoji||'🌸':'🌸'}</span>`;
  }
  // Body
  const body=E('div','fc-body');
  const role=E('div','fc-role',f?f.role||'':'点击编辑角色');
  role.contentEditable='true';
  const name=ed(E('div','fc-name',f?f.name||'':'花材名称'));
  const desc=ed(E('div','fc-desc',f?f.description||'':'描述花材特征与视觉作用'));
  body.append(role,name,desc);
  fc.append(photoBox,body);
  return fc;
}

// Download - high quality
async function dlImage(ig,foot){
  foot.style.display='none';
  // Freeze editable styles for clean render
  const eds=ig.querySelectorAll('[contenteditable]');
  eds.forEach(e=>{
    e.removeAttribute('contenteditable');
    e.style.background='none';
    e.style.boxShadow='none';
    e.style.padding='0';
  });
  // Wait for images
  const imgs=ig.querySelectorAll('img');
  await Promise.allSettled([...imgs].map(img=>
    img.complete?Promise.resolve():new Promise(r=>{img.onload=r;img.onerror=r;})
  ));
  try{
    const canvas=await html2canvas(ig,{
      scale:3,
      useCORS:true,
      allowTaint:true,
      backgroundColor:'#faf7f0',
      logging:false,
      imageTimeout:8000
    });
    const a=document.createElement('a');
    a.download='花艺智析_'+new Date().toLocaleDateString('zh')+'.png';
    a.href=canvas.toDataURL('image/png',1.0);
    a.click();
    toast('📥 高清图已下载！');
  }catch(e){
    toast('下载失败：'+e.message);
  }finally{
    foot.style.display='flex';
    eds.forEach(e=>{e.contentEditable='true';});
  }
}
</script>
